name: gate-unit-test-coverage-instrumentation
description: >
  Gate unit test coverage instrumentation behind ENABLE_CODE_COVERAGE CMake toggle.
  Prevents unconditional libgcov instrumentation when coverage is disabled, eliminating
  spurious profiling warnings in fork-heavy test environments.
